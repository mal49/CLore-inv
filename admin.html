<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — CLore Invitation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Great+Vibes&display=swap"
    rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #000;
      --surface: #111;
      --border: rgba(255, 255, 255, 0.08);
      --text: #e9e8e4;
      --muted: #a0998e;
      --font-serif: 'Cormorant Garamond', Georgia, serif;
    }

    html,
    body {
      width: 100%;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-serif);
    }

    /* ── stars ── */
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
    }

    @keyframes twinkle {

      0%,
      100% {
        opacity: 0.15;
        transform: scale(1);
      }

      50% {
        opacity: 0.9;
        transform: scale(1.6);
      }
    }

    /* ── loading bar ── */
    #loading-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      z-index: 300;
      background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.55) 50%, transparent 100%);
      background-size: 200% 100%;
      animation: barShimmer 1.3s ease-in-out infinite;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    #loading-bar.active {
      opacity: 1;
    }

    @keyframes barShimmer {
      0% {
        background-position: 200% 0;
      }

      100% {
        background-position: -200% 0;
      }
    }

    /* ── pin gate ── */
    #pin-gate {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      gap: 2rem;
    }

    .pin-symbol {
      font-size: 28px;
      color: #fff;
      letter-spacing: 16px;
      padding-left: 16px;
      opacity: 0.55;
    }

    .pin-title {
      font-size: 10px;
      letter-spacing: 5px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .pin-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: 100%;
      max-width: 260px;
    }

    .pin-input {
      width: 100%;
      padding: 12px 0;
      text-align: center;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.18);
      color: #fff;
      font-size: 20px;
      letter-spacing: 10px;
      font-family: var(--font-serif);
      outline: none;
    }

    .pin-input::placeholder {
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 3px;
      font-size: 12px;
    }

    .pin-input:focus {
      border-color: rgba(255, 255, 255, 0.45);
    }

    .pin-btn {
      width: 100%;
      padding: 12px;
      background: var(--text);
      color: #1a1a1a;
      border: none;
      cursor: pointer;
      font-family: var(--font-serif);
      font-size: 11px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      transition: opacity 0.2s;
      margin-top: 0.25rem;
    }

    .pin-btn:hover {
      opacity: 0.82;
    }

    .pin-error {
      font-size: 11px;
      color: #c0392b;
      letter-spacing: 1px;
      min-height: 16px;
      text-align: center;
    }

    /* ── admin panel ── */
    #admin-panel {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      max-width: 680px;
      margin: 0 auto;
      padding: 3rem 1.5rem 5rem;
    }

    .admin-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .admin-brand {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .admin-company {
      font-size: 9px;
      letter-spacing: 5px;
      color: var(--muted);
      text-transform: uppercase;
    }

    .admin-title {
      font-size: 20px;
      color: var(--text);
      letter-spacing: 1px;
    }

    .btn-lock {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: var(--muted);
      font-family: var(--font-serif);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-lock:hover {
      border-color: rgba(255, 255, 255, 0.38);
      color: var(--text);
    }

    /* ── setup banner ── */
    #setup-banner {
      background: rgba(192, 57, 43, 0.08);
      border: 1px solid rgba(192, 57, 43, 0.28);
      padding: 1.25rem 1.5rem;
      margin-bottom: 2rem;
      font-size: 12px;
      color: #e08080;
      line-height: 1.8;
      letter-spacing: 0.3px;
    }

    #setup-banner strong {
      color: #ebb;
    }

    #setup-banner code {
      background: rgba(255, 255, 255, 0.07);
      padding: 1px 6px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: #ddd;
    }

    /* ── add section ── */
    .add-section {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1.75rem;
      margin-bottom: 2.5rem;
    }

    .section-label {
      font-size: 9px;
      letter-spacing: 4px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 1.25rem;
    }

    .add-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .guest-input {
      flex: 1;
      padding: 10px 0;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.14);
      color: var(--text);
      font-size: 15px;
      font-family: var(--font-serif);
      outline: none;
    }

    .guest-input::placeholder {
      color: rgba(255, 255, 255, 0.2);
      font-size: 13px;
      font-style: italic;
    }

    .guest-input:focus {
      border-color: rgba(255, 255, 255, 0.38);
    }

    .btn-add {
      padding: 10px 22px;
      background: var(--text);
      color: #1a1a1a;
      border: none;
      cursor: pointer;
      font-family: var(--font-serif);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      white-space: nowrap;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }

    .btn-add:hover:not(:disabled) {
      opacity: 0.82;
    }

    .btn-add:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* ── guest list ── */
    .list-header {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .guest-count {
      background: rgba(255, 255, 255, 0.07);
      font-size: 10px;
      color: var(--muted);
      padding: 2px 9px;
      letter-spacing: 1px;
    }

    .guest-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .guest-empty {
      padding: 3.5rem;
      text-align: center;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.18);
      letter-spacing: 2px;
      font-style: italic;
      border: 1px solid var(--border);
    }

    .guest-row {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      animation: rowIn 0.28s ease both;
    }

    @keyframes rowIn {
      from {
        opacity: 0;
        transform: translateX(-6px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .guest-idx {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.2);
      min-width: 22px;
      letter-spacing: 0.5px;
    }

    .guest-name-text {
      flex: 1;
      font-size: 15px;
      color: var(--text);
    }

    .btn-copy {
      padding: 6px 14px;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: var(--muted);
      font-family: var(--font-serif);
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-copy:hover {
      border-color: rgba(255, 255, 255, 0.38);
      color: var(--text);
    }

    .btn-copy.copied {
      border-color: rgba(255, 255, 255, 0.28);
      color: var(--text);
    }

    .btn-del {
      padding: 6px 10px;
      background: transparent;
      border: 1px solid transparent;
      color: rgba(255, 255, 255, 0.2);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
      line-height: 1;
      flex-shrink: 0;
    }

    .btn-del:hover {
      color: #c0392b;
      border-color: rgba(192, 57, 43, 0.3);
    }

    /* ── confirm modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 400;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-box {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2.25rem 2rem;
      max-width: 360px;
      width: calc(100% - 2rem);
      text-align: center;
      animation: modalIn 0.28s ease both;
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: scale(0.96) translateY(8px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .modal-icon {
      font-size: 28px;
      color: rgba(255, 255, 255, 0.35);
      margin-bottom: 1rem;
    }

    .modal-title {
      font-size: 16px;
      color: var(--text);
      letter-spacing: 0.5px;
      margin-bottom: 0.5rem;
    }

    .modal-name {
      font-size: 15px;
      color: var(--muted);
      font-style: italic;
      margin-bottom: 1.75rem;
      line-height: 1.5;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .btn-modal {
      padding: 10px 22px;
      font-family: var(--font-serif);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
      border: none;
    }

    .btn-modal:hover {
      opacity: 0.82;
    }

    .btn-modal-cancel {
      background: transparent;
      color: var(--muted);
      border: 1px solid rgba(255, 255, 255, 0.14);
    }

    .btn-modal-confirm {
      background: #c0392b;
      color: #fff;
    }

    /* ── toast ── */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--text);
      color: #1a1a1a;
      padding: 10px 22px;
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      font-family: var(--font-serif);
      opacity: 0;
      transition: opacity 0.22s, transform 0.22s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 200;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media(max-width:480px) {
      #admin-panel {
        padding: 2rem 1rem 4rem;
      }

      .admin-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;
      }

      .add-row {
        flex-direction: column;
      }

      .btn-add {
        width: 100%;
      }

      .guest-row {
        flex-wrap: wrap;
        gap: 8px;
      }
    }
  </style>
</head>

<body>

  <div id="loading-bar"></div>
  <div class="stars" id="stars"></div>

  <!-- PIN Gate -->
  <div id="pin-gate">
    <div class="pin-symbol">✦ &nbsp; ✦ &nbsp; ✦</div>
    <div class="pin-title">Admin Access</div>
    <div class="pin-box">
      <input class="pin-input" type="password" id="pinInput" maxlength="8" placeholder="enter pin" autocomplete="off">
      <button class="pin-btn" onclick="checkPin()">Unlock</button>
      <div class="pin-error" id="pinError"></div>
    </div>
  </div>

  <!-- Admin Panel -->
  <div id="admin-panel" hidden>
    <div class="admin-header">
      <div class="admin-brand">
        <div class="admin-company">CLore Sdn. Bhd.</div>
        <div class="admin-title">Guest Manager</div>
      </div>
      <button class="btn-lock" onclick="logout()">Lock</button>
    </div>

    <div id="setup-banner" hidden>
      <strong>Setup required</strong><br>
      Open <code>admin.html</code> in a text editor and paste your Apps Script deployment URL into the
      <code>SCRIPT_URL</code> constant at the top of the <code>&lt;script&gt;</code> block.
      See <code>Code.gs</code> for instructions on deploying the script.
    </div>

    <div class="add-section">
      <div class="section-label">Add Guest</div>
      <div class="add-row">
        <input class="guest-input" type="text" id="guestInput" placeholder="Full name, e.g. Dato' Ahmad Faris"
          maxlength="80">
        <button class="btn-add" id="btnAdd" onclick="addGuest()">Add</button>
      </div>
    </div>

    <div class="list-header">
      <div class="section-label" style="margin-bottom:0">Guest List</div>
      <span class="guest-count" id="guestCount">0</span>
    </div>
    <div class="guest-list" id="guestList"></div>
  </div>

  <!-- Confirm Modal -->
  <div class="modal-overlay" id="confirmModal">
    <div class="modal-box">
      <div class="modal-icon">✕</div>
      <div class="modal-title">Remove Guest</div>
      <div class="modal-name" id="modalGuestName"></div>
      <div class="modal-actions">
        <button class="btn-modal btn-modal-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-modal btn-modal-confirm" id="modalConfirmBtn">Remove</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    // ── config ─────────────────────────────────────────────────────────────────
    const ADMIN_PIN = '6767'; // change this to your preferred PIN

    // Paste your Apps Script web app URL here after deploying Code.gs
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxcohE7oDPFiW7LTttYkVD1uO4qSf1n9IS1O35CLPgkh1U1msrtQ_wtcBOzc0xyof4i/exec';
    // ───────────────────────────────────────────────────────────────────────────

    // ── stars ──
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 40; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 100 + '%';
      s.style.setProperty('--d', (2 + Math.random() * 4) + 's');
      s.style.setProperty('--delay', (-Math.random() * 4) + 's');
      s.style.opacity = Math.random() * 0.7;
      starsEl.appendChild(s);
    }

    // ── session persistence ──
    if (sessionStorage.getItem('admin_unlocked') === '1') {
      document.getElementById('pin-gate').style.display = 'none';
      document.getElementById('admin-panel').hidden = false;
      init();
    }

    document.getElementById('pinInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') checkPin();
    });

    function checkPin() {
      const val = document.getElementById('pinInput').value;
      if (val === ADMIN_PIN) {
        sessionStorage.setItem('admin_unlocked', '1');
        document.getElementById('pin-gate').style.display = 'none';
        document.getElementById('admin-panel').hidden = false;
        init();
      } else {
        const err = document.getElementById('pinError');
        err.textContent = 'Incorrect PIN. Try again.';
        document.getElementById('pinInput').value = '';
        setTimeout(() => err.textContent = '', 2800);
      }
    }

    function logout() {
      sessionStorage.removeItem('admin_unlocked');
      document.getElementById('admin-panel').hidden = true;
      document.getElementById('pin-gate').style.display = 'flex';
      document.getElementById('pinInput').value = '';
    }

    // ── init ──
    function init() {
      if (!SCRIPT_URL) {
        document.getElementById('setup-banner').hidden = false;
        renderGuests([]);
        return;
      }
      loadGuests();
    }

    // ── API ──
    async function api(params) {
      const url = SCRIPT_URL + '?' + new URLSearchParams(params).toString();
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    }

    // ── load ──
    async function loadGuests() {
      setLoading(true);
      try {
        const data = await api({ action: 'list' });
        renderGuests(data.guests || []);
      } catch {
        showToast('Failed to load guest list');
        renderGuests([]);
      } finally {
        setLoading(false);
      }
    }

    // ── add ──
    document.getElementById('guestInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addGuest();
    });

    async function addGuest() {
      if (!SCRIPT_URL) { showToast('Script URL not configured'); return; }
      const input = document.getElementById('guestInput');
      const name = input.value.trim();
      if (!name) return;
      setLoading(true);
      try {
        const data = await api({ action: 'add', name });
        input.value = '';
        renderGuests(data.guests || []);
        input.focus();
      } catch {
        showToast('Failed to add guest');
      } finally {
        setLoading(false);
      }
    }

    // ── delete ──
    let pendingDeleteName = null;

    function openDeleteModal(name) {
      pendingDeleteName = name;
      document.getElementById('modalGuestName').textContent = name;
      document.getElementById('confirmModal').classList.add('active');
    }

    function closeModal() {
      pendingDeleteName = null;
      document.getElementById('confirmModal').classList.remove('active');
    }

    document.getElementById('modalConfirmBtn').addEventListener('click', async () => {
      if (!pendingDeleteName) return;
      const name = pendingDeleteName;
      closeModal();
      if (!SCRIPT_URL) { showToast('Script URL not configured'); return; }
      setLoading(true);
      try {
        const data = await api({ action: 'delete', name });
        renderGuests(data.guests || []);
      } catch {
        showToast('Failed to remove guest');
      } finally {
        setLoading(false);
      }
    });

    // close modal on overlay click
    document.getElementById('confirmModal').addEventListener('click', e => {
      if (e.target === document.getElementById('confirmModal')) closeModal();
    });

    // close modal on Escape key
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });

    async function deleteGuest(name) {
      openDeleteModal(name);
    }

    // ── copy link ──
    function getGuestLink(name) {
      const base = window.location.href.replace(/\/admin\.html.*$/i, '/index.html');
      return base + '?guest=' + encodeURIComponent(name);
    }

    function shortenUrl(longUrl) {
      return new Promise((resolve, reject) => {
        const cb = 'shorten_' + Date.now();
        const script = document.createElement('script');
        const cleanup = () => {
          delete window[cb];
          if (script.parentNode) script.parentNode.removeChild(script);
        };

        window[cb] = (data) => {
          cleanup();
          if (data.shorturl) resolve(data.shorturl);
          else reject(new Error(data.errormessage || 'Shortening failed'));
        };

        script.onerror = () => { cleanup(); reject(new Error('Shortener load error')); };
        setTimeout(() => { cleanup(); reject(new Error('Shortener timeout')); }, 5000);

        script.src = 'https://is.gd/create.php?format=json&url=' + encodeURIComponent(longUrl) + '&callback=' + cb;
        document.head.appendChild(script);
      });
    }

    async function copyLink(name, btn) {
      const longUrl = getGuestLink(name);
      let link = longUrl;
      try { link = await shortenUrl(longUrl); }
      catch (e) { console.log('Shortening failed, using full URL'); }

      const orig = btn.textContent;
      const done = () => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        showToast('Link copied');
        setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
      };
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(link).then(done).catch(() => fallbackCopy(link, done));
      } else {
        fallbackCopy(link, done);
      }
    }

    function fallbackCopy(text, cb) {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.readOnly = true;
      ta.contentEditable = true;
      ta.style.cssText = 'position:fixed;top:0;left:0;width:1px;height:1px;padding:0;border:none;outline:none;box-shadow:none;background:transparent;color:transparent;caret-color:transparent;z-index:-1;overflow:hidden;resize:none;';
      document.body.appendChild(ta);

      if (navigator.userAgent.match(/ipad|iphone/i)) {
        const range = document.createRange();
        range.selectNodeContents(ta);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
        ta.setSelectionRange(0, text.length);
      } else {
        ta.select();
      }

      try {
        const ok = document.execCommand('copy');
        document.body.removeChild(ta);
        if (ok) cb();
        else showToast('Copy failed — select the link manually');
      } catch {
        document.body.removeChild(ta);
        showToast('Copy failed — select the link manually');
      }
    }

    async function copyLink(name, btn) {
      const longUrl = getGuestLink(name);
      let link = longUrl;
      try { link = await shortenUrl(longUrl); }
      catch (e) { console.log('Shortening failed, using full URL'); }

      const orig = btn.textContent;
      const done = () => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        showToast('Link copied');
        setTimeout(() => { btn.textContent = orig; btn.classList.remove('copied'); }, 2000);
      };

      if (navigator.clipboard && window.isSecureContext) {
        try {
          await navigator.clipboard.writeText(link);
          done();
          return;
        } catch (e) {
          console.log('Clipboard API failed, using fallback', e);
        }
      }
      fallbackCopy(link, done);
    }

    // ── render ──
    function renderGuests(guests) {
      document.getElementById('guestCount').textContent = guests.length;
      const container = document.getElementById('guestList');
      container.innerHTML = '';

      if (guests.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'guest-empty';
        empty.textContent = SCRIPT_URL ? 'No guests added yet' : 'Configure SCRIPT_URL to get started';
        container.appendChild(empty);
        return;
      }

      guests.forEach((name, i) => {
        const row = document.createElement('div');
        row.className = 'guest-row';

        const idx = document.createElement('span');
        idx.className = 'guest-idx';
        idx.textContent = String(i + 1).padStart(2, '0');

        const nameEl = document.createElement('span');
        nameEl.className = 'guest-name-text';
        nameEl.textContent = name;

        const copyBtn = document.createElement('button');
        copyBtn.className = 'btn-copy';
        copyBtn.textContent = 'Copy Link';
        copyBtn.onclick = () => copyLink(name, copyBtn);

        const delBtn = document.createElement('button');
        delBtn.className = 'btn-del';
        delBtn.title = 'Remove guest';
        delBtn.textContent = '✕';
        delBtn.onclick = () => deleteGuest(name);

        row.append(idx, nameEl, copyBtn, delBtn);
        container.appendChild(row);
      });
    }

    // ── loading ──
    function setLoading(on) {
      document.getElementById('loading-bar').classList.toggle('active', on);
      document.getElementById('btnAdd').disabled = on;
    }

    // ── toast ──
    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
    }
  </script>
</body>

</html>
